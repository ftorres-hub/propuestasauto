<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preparar propuesta desde Diio</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f7;
  padding: 40px;
  color: #1B1B1B;
}

.container {
  max-width: 720px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 10px;
  border: 1px solid #e5e5e5;
}

h1 { margin-bottom: 10px; }

.field { margin-bottom: 15px; }

label {
  display: block;
  margin-bottom: 5px;
  font-size: 14px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
  font-size: 14px;
}

textarea {
  min-height: 220px;
}

button {
  background: #FA345E;
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 6px;
  cursor: pointer;
}

.status {
  margin-top: 15px;
  font-size: 13px;
}

.error { color: red; }
.ok { color: green; }
</style>
</head>

<body>
<div class="container">

<h1>Preparar propuesta desde Diio</h1>

<!-- 🔴 PRODUCTO -->
<div class="field">
  <label>Producto de la propuesta</label>
  <select id="producto">
    <option value="Apprecio Performance">Apprecio Performance</option>
    <option value="Apprecio Teams">Apprecio Teams</option>
  </select>
</div>

<!-- KAM -->
<div class="field">
  <label>Nombre KAM</label>
  <input id="kam_nombre">
</div>

<div class="field">
  <label>Correo KAM</label>
  <input id="kam_correo">
</div>

<!-- CLIENTE -->
<div class="field">
  <label>Nombre Empresa</label>
  <input id="empresa">
</div>

<div class="field">
  <label>Nombre Cliente</label>
  <input id="contacto">
</div>

<div class="field">
  <label>Correo Cliente</label>
  <input id="correo_cliente">
</div>

<!-- RESUMEN DIIO -->
<div class="field">
  <label>Resumen Diio</label>
  <textarea id="resumen_diio"></textarea>
</div>

<button onclick="submitData()">Preparar formulario</button>

<div id="status" class="status"></div>

</div>

<script>
const WEBHOOK_URL = 'https://n8n.openip.cl/webhook/diio-resumen-manual';

async function submitData() {
  const status = document.getElementById('status');

  const payload = {
    producto: document.getElementById('producto').value,

    kam_nombre: document.getElementById('kam_nombre').value,
    kam_correo: document.getElementById('kam_correo').value,

    empresa: document.getElementById('empresa').value,
    contacto: document.getElementById('contacto').value,
    correo_cliente: document.getElementById('correo_cliente').value,

    resumen_diio: document.getElementById('resumen_diio').value,
    tipo_reunion: 'Exploración Fuerza'
  };

  if (!payload.kam_nombre || !payload.kam_correo || !payload.resumen_diio) {
    status.className = 'status error';
    status.textContent = 'Completa los campos obligatorios';
    return;
  }

  status.textContent = 'Enviando...';

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const text = await res.text();

    let data = {};
    try { data = JSON.parse(text); } catch {}

    if (data.form_url) {
      window.location.href = data.form_url;
    } else {
      status.className = 'status ok';
      status.textContent = 'Enviado correctamente';
    }

  } catch (e) {
    status.className = 'status error';
    status.textContent = 'Error enviando a n8n';
  }
}
</script>

</body>
</html>

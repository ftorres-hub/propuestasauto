<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Propuesta Comercial</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 40px;
      color: #1B1B1B;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
    }

    .success-container {
      max-width: 520px;
      margin: 120px auto;
      background: white;
      padding: 36px;
      border-radius: 10px;
      text-align: center;
    }

    .success-container h1 {
      font-size: 22px;
      margin: 0;
      color: #1B1B1B;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      margin-bottom: 15px;
      padding: 10px;
      box-sizing: border-box;
    }

    button {
      background: #FA345E;
      color: white;
      border: none;
      padding: 12px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
<div class="container">

<h2>Propuesta Comercial</h2>

<label>Producto</label>
<input id="producto">

<label>Empresa</label>
<input id="empresa">

<label>Página web</label>
<input id="web">

<label>Contacto</label>
<input id="contacto">

<label>Correo cliente</label>
<input id="correo_cliente">

<label>Nombre KAM</label>
<input id="kam_nombre">

<label>Correo KAM</label>
<input id="kam_correo">

<label>Industria</label>
<input id="industria">

<label>Número de colaboradores</label>
<select id="colaboradores">
  <option value="">Seleccionar</option>
  <option>150-499</option>
  <option>500-1999</option>
  <option>2000+</option>
</select>

<label>Descripción de la empresa</label>
<textarea id="descripcion"></textarea>

<label>¿Es cliente actual?</label>
<select id="cliente_actual">
  <option>No</option>
  <option>Sí</option>
</select>

<label>Objetivo principal del programa</label>
<textarea id="objetivo"></textarea>

<label>Rol foco del programa</label>
<select id="rol_foco">
  <option>Colaboradores en general</option>
  <option>Fuerza de ventas y comerciales</option>
  <option>Líderes y jefaturas</option>
  <option>Operaciones y terreno</option>
  <option>Área específica</option>
</select>

<label>Comentarios adicionales</label>
<textarea id="comentarios"></textarea>

<label>Prioridad de implementación</label>
<select id="q_prioridad">
  <option>Alta (este trimestre)</option>
  <option>Media (próximo semestre)</option>
  <option>Baja (sin fecha definida)</option>
</select>

<label>Estado del presupuesto</label>
<select id="q_presupuesto">
  <option>Aprobado</option>
  <option>En aprobación</option>
  <option>No definido</option>
</select>

<label>Nivel del sponsor</label>
<select id="q_sponsor">
  <option>Director/Gerente decisor</option>
  <option>Manager/Jefatura</option>
  <option>Sin sponsor claro</option>
</select>

<button id="submitButton" onclick="enviarPropuesta()">Generar propuesta</button>

</div>

<!-- PREFILL -->
<script>
const params = new URLSearchParams(window.location.search);

function setValue(id, param) {
  const el = document.getElementById(id);
  if (el && params.get(param)) {
    el.value = params.get(param);
  }
}

setValue('producto', 'producto');
setValue('empresa', 'empresa');
setValue('web', 'web');
setValue('contacto', 'contacto');
setValue('correo_cliente', 'correo_cliente');
setValue('kam_nombre', 'kam_nombre');
setValue('kam_correo', 'kam_correo');
setValue('industria', 'industria');
setValue('colaboradores', 'colaboradores');
setValue('descripcion', 'descripcion');
setValue('cliente_actual', 'cliente_actual');
setValue('objetivo', 'objetivo');
setValue('rol_foco', 'rol_foco');
setValue('comentarios', 'comentarios');
setValue('q_prioridad', 'q_prioridad');
setValue('q_presupuesto', 'q_presupuesto');
setValue('q_sponsor', 'q_sponsor');
</script>

<!-- ENVÍO -->
<script>
function showSuccessMessage() {
  document.body.innerHTML = `
    <div class="success-container">
      <h1>Tu propuesta fue enviada con éxito.</h1>
    </div>
  `;
}

function enviarPropuesta() {
  const button = document.getElementById('submitButton');

  const data = {
    producto: document.getElementById('producto').value,
    empresa: document.getElementById('empresa').value,
    web: document.getElementById('web').value,
    contacto: document.getElementById('contacto').value,
    correo_cliente: document.getElementById('correo_cliente').value,
    kam_nombre: document.getElementById('kam_nombre').value,
    kam_correo: document.getElementById('kam_correo').value,
    industria: document.getElementById('industria').value,
    colaboradores: document.getElementById('colaboradores').value,
    descripcion: document.getElementById('descripcion').value,
    cliente_actual: document.getElementById('cliente_actual').value,
    objetivo: document.getElementById('objetivo').value,
    rol_foco: document.getElementById('rol_foco').value,
    comentarios: document.getElementById('comentarios').value,
    q_prioridad: document.getElementById('q_prioridad').value,
    q_presupuesto: document.getElementById('q_presupuesto').value,
    q_sponsor: document.getElementById('q_sponsor').value
  };

  button.disabled = true;
  button.textContent = 'Enviando...';

  fetch('https://n8n.openip.cl/webhook/cc588c32-6fb7-4696-8109-321f9e5e6524', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(data)
  })
  .then(res => {
    if (!res.ok) throw new Error();
    showSuccessMessage();
  })
  .catch(err => {
    button.disabled = false;
    button.textContent = 'Generar propuesta';
    alert('Error enviando propuesta');
    console.error(err);
  });
}
</script>

</body>
</html>
